<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    body {
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      margin: 0;
    }
    .auth-container {
      width: 100%;
      max-width: 400px;
      padding: 2rem 1.5rem;
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid #333;
      margin: 20px;
    }
    .auth-container h2 { text-align: center; margin-bottom: 1.5rem; color: #e91e63; }
    .input-group { margin-bottom: 1rem; }
    .input-group label { display: block; margin-bottom: 0.3rem; color: #e91e63; }
    .input-group input {
      width: 100%;
      padding: 0.8rem;
      background: #fff;
      border: 1px solid #444;
      border-radius: 10px;
      color: #e91e65;
      font-size: 1rem;
      box-sizing: border-box;
    }
    .btn-full {
      width: 100%;
      padding: 0.9rem;
      background: #e91e63;
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      font-size: 1.1rem;
      cursor: pointer;
    }
    .auth-link { text-align: center; margin-top: 1rem; color: #aaa; }
    .auth-link a { color: #e91e63; text-decoration: none; }
  </style>
</head>
<body>
  <div class="auth-container">
    <h2>Set new password</h2>
    <div class="input-group">
      <label>New Password</label>
      <input type="password" id="password" placeholder="Min 6 characters" required>
    </div>
    <button class="btn-full" id="updateBtn">Update Password</button>
    <p class="auth-link"><a href="login.html">Back to login</a></p>
    <p id="status" style="text-align:center; margin-top:1rem;"></p>
  </div>

  <script>
    // The token is automatically handled by Supabase via the URL hash fragment.
    // No need to extract it manually – supabase.auth.updateUser() will use it.
    document.getElementById('updateBtn').addEventListener('click', async () => {
      const password = document.getElementById('password').value;
      if (password.length < 6) return alert('Password must be at least 6 characters.');
      
      const { error } = await supabase.auth.updateUser({ password });
      
      if (error) {
        document.getElementById('status').textContent = 'Error: ' + error.message;
      } else {
        document.getElementById('status').textContent = '✅ Password updated! Redirecting…';
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
      }
    });
  </script>
</body>
</html>
