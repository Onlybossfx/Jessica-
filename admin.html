<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <style>
    /* ========== Mobile‑first base ========== */
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(10,10,10,0.95);
      border-bottom: 1px solid #222;
      flex-wrap: wrap;
      gap: 8px;
    }
    .navbar h2 {
      font-size: 1.3rem;
      margin: 0;
    }
    .nav-btn {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .nav-btn.logout {
      background: #333;
      color: #ddd;
    }

    /* Admin section */
    .admin-section {
      width: 100%;
      max-width: 500px;
      margin: 2rem auto;
      padding: 1.5rem 1.2rem;
      background: #1a1a1a;
      border-radius: 20px;
      border: 1px solid #333;
      box-sizing: border-box;
    }
    .admin-section h2 {
      font-size: 1.5rem;
      margin-bottom: 1.2rem;
    }

    .admin-section input,
    .admin-section select,
    .admin-section label {
      display: block;
      width: 100%;
      margin-bottom: 1rem;
      font-size: 1rem;
      box-sizing: border-box;
    }

    .admin-section label {
      color: #ccc;
      font-size: 0.9rem;
      margin-bottom: 0.3rem;
    }

    .admin-section input[type="text"],
    .admin-section input[type="number"],
    .admin-section select {
      padding: 0.8rem;
      background: #222;
      border: 1px solid #444;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
      -webkit-appearance: none;
    }

    .admin-section input:focus,
    .admin-section select:focus {
      border-color: #e91e63;
    }

    /* File inputs */
    .admin-section input[type="file"] {
      background: #222;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 0.6rem;
      color: #ccc;
      font-size: 0.9rem;
    }

    .admin-section input[type="file"]::file-selector-button {
      background: #333;
      color: #fff;
      border: none;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      margin-right: 1rem;
      cursor: pointer;
    }

    .btn-full {
      width: 100%;
      padding: 0.9rem;
      background: #e91e63;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }

    .btn-full:hover {
      background: #ff3366;
    }

    #status {
      text-align: center;
      margin-top: 1rem;
      color: #aaa;
      font-size: 0.9rem;
    }

    /* ========== Tablet & desktop ========== */
    @media (min-width: 600px) {
      .navbar {
        padding: 14px 24px;
      }
      .navbar h2 {
        font-size: 1.5rem;
      }
      .nav-btn {
        font-size: 0.9rem;
        padding: 0.5rem 1.2rem;
      }
      .admin-section {
        margin-top: 3rem;
        padding: 2rem;
      }
      .admin-section h2 {
        font-size: 1.8rem;
      }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <h2 style="color:#e91e63;">Admin Panel</h2>
    <button class="nav-btn logout" onclick="logout()">Logout</button>
  </div>
  <div class="admin-section">
    <h2>Upload New Media</h2>
    <input type="text" id="title" placeholder="Title" required>
    <select id="type"><option value="image">Image</option><option value="video">Video</option></select>
    <input type="number" id="price" placeholder="Price (USD)" min="1">
    <label>Original file (high-res)</label>
    <input type="file" id="originalFile" accept="image/*,video/*" required>
    <label>Preview file (watermarked/low-res)</label>
    <input type="file" id="previewFile" accept="image/*,video/*" required>
    <button class="btn-full" id="uploadBtn">Upload</button>
    <p id="status" style="margin-top:1rem;"></p>
  </div>

  <script>
    async function checkAdmin() {
      await requireAuth();
      const user = await getCurrentUser();
      const { data } = await supabase.from('admin_users').select('user_id').eq('user_id', user.id).single();
      if (!data) {
        alert('Access denied');
        window.location.href = 'gallery.html';
      }
    }

    document.getElementById('uploadBtn').addEventListener('click', async () => {
      const title = document.getElementById('title').value;
      const type = document.getElementById('type').value;
      const price = parseInt(document.getElementById('price').value);
      const original = document.getElementById('originalFile').files[0];
      const preview = document.getElementById('previewFile').files[0];
      if (!title || !original || !preview) return alert('Fill all fields');

      const status = document.getElementById('status');
      status.textContent = 'Uploading…';

      // Upload original to private bucket
      const origPath = `${Date.now()}_original.${original.name.split('.').pop()}`;
      const { error: origErr } = await supabase.storage.from('originals').upload(origPath, original);
      if (origErr) { status.textContent = origErr.message; return; }

      // Upload preview to public bucket
      const prevPath = `${Date.now()}_preview.${preview.name.split('.').pop()}`;
      const { error: prevErr } = await supabase.storage.from('previews').upload(prevPath, preview);
      if (prevErr) { status.textContent = prevErr.message; return; }

      // Get public URL for preview
      const { data: { publicUrl } } = supabase.storage.from('previews').getPublicUrl(prevPath);

      const { error: insertErr } = await supabase.from('media').insert({
        title, type, price, original_path: origPath, preview_path: prevPath, preview_url: publicUrl
      });
      if (insertErr) {
        status.textContent = insertErr.message;
      } else {
        status.textContent = 'Upload successful!';
        document.getElementById('title').value = '';
        document.getElementById('originalFile').value = '';
        document.getElementById('previewFile').value = '';
      }
    });

    checkAdmin();
  </script>
</body>
</html>
