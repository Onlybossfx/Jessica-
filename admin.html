<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <style>
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
    }
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(10,10,10,0.95);
      border-bottom: 1px solid #222;
    }
    .navbar h2 { color: #e91e63; margin: 0; font-size: 1.3rem; }
    .nav-btn {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      background: #333;
      color: #ddd;
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.5rem;
      padding: 1rem 1rem 0;
      max-width: 700px;
      margin: 0 auto;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .tab-btn {
      padding: 0.6rem 1.2rem;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 25px;
      color: #aaa;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
      font-size: 0.9rem;
    }
    .tab-btn.active {
      background: #e91e63;
      color: white;
      border-color: #e91e63;
    }

    /* Tab content */
    .tab-content {
      display: none;
      max-width: 700px;
      margin: 1.5rem auto;
      padding: 0 1rem;
    }
    .tab-content.active {
      display: block;
    }

    /* Upload form */
    .admin-section h2 { font-size: 1.5rem; margin-bottom: 1rem; }
    .admin-section input,
    .admin-section select,
    .admin-section label {
      display: block;
      width: 100%;
      margin-bottom: 1rem;
      font-size: 1rem;
      box-sizing: border-box;
    }
    .admin-section label { color: #ccc; font-size: 0.9rem; margin-bottom: 0.3rem; }
    .admin-section input[type="text"],
    .admin-section input[type="number"],
    .admin-section select {
      padding: 0.8rem;
      background: #222;
      border: 1px solid #444;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      outline: none;
    }
    .admin-section input[type="file"] {
      background: #222;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 0.6rem;
      color: #ccc;
    }
    .btn-full {
      width: 100%;
      padding: 0.9rem;
      background: #e91e63;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      margin-top: 0.5rem;
    }
    .btn-full:disabled { opacity: 0.5; }

    /* Media & message items */
    .media-list {
      margin-top: 0;
    }
    .media-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1a1a1a;
      border-radius: 12px;
      padding: 0.7rem 1rem;
      margin-bottom: 0.7rem;
      border: 1px solid #333;
    }
    .media-item img, .media-item video {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 8px;
      margin-right: 1rem;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    .media-item .info { flex: 1; }
    .media-item .info h4 { margin: 0 0 0.2rem; font-size: 0.95rem; }
    .media-item .info span { color: #e91e63; font-weight: bold; font-size: 0.85rem; }
    .delete-btn {
      background: transparent;
      border: 1px solid #e91e63;
      color: #e91e63;
      border-radius: 20px;
      padding: 0.3rem 0.8rem;
      cursor: pointer;
      font-weight: 600;
      font-size: 0.8rem;
    }

    /* Message specific */
    .message-item {
      flex-direction: column;
      align-items: flex-start;
      gap: 0.3rem;
    }
    .message-header {
      display: flex;
      justify-content: space-between;
      width: 100%;
    }
    .message-header strong { font-size: 0.95rem; }
    .message-header small { color: #aaa; font-size: 0.8rem; }
    .message-subject { color: #e91e63; font-weight: bold; }
    .message-body { color: #ccc; }

    #uploadStatus, #mediaStatus, #messagesStatus {
      text-align: center;
      margin-top: 0.5rem;
    }

    /* Support floating button (optional) */
    .support-float-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #e91e63;
      color: white;
      border: none;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      font-size: 1.8rem;
      box-shadow: 0 4px 15px rgba(233,30,99,0.4);
      cursor: pointer;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .support-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .support-modal-overlay.active { display: flex; }
    .support-modal {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 1.5rem;
      width: 90%;
      max-width: 400px;
      position: relative;
    }
    .support-modal h3 { color: #e91e63; margin-top: 0; }
    .support-modal input,
    .support-modal textarea {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1rem;
      background: #222;
      border: 1px solid #444;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      box-sizing: border-box;
    }
    .support-modal textarea { height: 100px; resize: vertical; }
    .support-modal button {
      background: #e91e63;
      border: none;
      color: white;
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }
    .support-modal button:disabled { opacity: 0.5; }
    .support-modal .close-btn {
      background: transparent;
      border: none;
      color: #aaa;
      font-size: 1.5rem;
      position: absolute;
      top: 10px;
      right: 15px;
      cursor: pointer;
      width: auto;
      padding: 0;
    }

    @media (min-width: 600px) {
      .navbar { padding: 14px 24px; }
      .tabs { gap: 1rem; }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <h2>Admin Panel</h2>
    <button class="nav-btn" onclick="logout()">Logout</button>
  </div>

  <!-- Tab navigation -->
  <div class="tabs">
    <button class="tab-btn active" data-tab="upload">Upload</button>
    <button class="tab-btn" data-tab="media">Media</button>
    <button class="tab-btn" data-tab="messages">Messages</button>
  </div>

  <!-- Tab: Upload -->
  <div class="tab-content active" id="tab-upload">
    <div class="admin-section">
      <h2>Upload New Media</h2>
      <input type="text" id="title" placeholder="Title" required>
      <select id="type">
        <option value="image">Image</option>
        <option value="video">Video</option>
      </select>
      <input type="number" id="price" placeholder="Price (USD)" min="1" value="5">
      <label>Original file (high-res)</label>
      <input type="file" id="originalFile" accept="image/*,video/*" required>
      <label>Preview file (watermarked/low-res)</label>
      <input type="file" id="previewFile" accept="image/*,video/*" required>

      <!-- Free sample checkbox -->
      <label style="display:flex; align-items:center; gap:0.5rem; margin-bottom:1rem;">
        <input type="checkbox" id="freeSample" style="width:auto;">
        <span style="color:#ccc;">Free Sample (max 4 per day)</span>
      </label>

      <button class="btn-full" id="uploadBtn">Upload</button>
      <p id="uploadStatus"></p>
    </div>
  </div>

  <!-- Tab: Media -->
  <div class="tab-content" id="tab-media">
    <div class="media-list">
      <h3>All Media</h3>
      <div id="mediaContainer"></div>
      <p id="mediaStatus"></p>
    </div>
  </div>

  <!-- Tab: Messages -->
  <div class="tab-content" id="tab-messages">
    <div class="media-list">
      <h3>Support Messages</h3>
      <div id="messagesContainer"></div>
      <p id="messagesStatus"></p>
    </div>
  </div>

  <!-- Support Floating Button & Modal (optional) -->
  <button class="support-float-btn" id="supportFloatBtn" title="Chat with support">💬</button>
  <div class="support-modal-overlay" id="supportOverlay">
    <div class="support-modal">
      <button class="close-btn" id="closeSupportBtn">&times;</button>
      <h3>Contact Support</h3>
      <input type="text" id="supportSubject" placeholder="Subject (optional)">
      <textarea id="supportMessage" placeholder="How can we help you?"></textarea>
      <button id="sendSupportBtn">Send Message</button>
      <p id="supportStatus" style="text-align:center; margin-top:0.5rem;"></p>
    </div>
  </div>

  <script>
    // Tab switching
    const tabButtons = document.querySelectorAll('.tab-btn');
    const tabContents = document.querySelectorAll('.tab-content');

    tabButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const tab = btn.dataset.tab;
        tabButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        tabContents.forEach(c => c.classList.remove('active'));
        document.getElementById('tab-' + tab).classList.add('active');
      });
    });

    // Admin check
    async function checkAdmin() {
      await requireAuth();
      const user = await getCurrentUser();
      const { data } = await supabase.from('admin_users').select('user_id').eq('user_id', user.id).single();
      if (!data) {
        alert('Access denied');
        window.location.href = 'dashboard.html';
      }
    }

    // Load media (Media tab)
    async function loadMedia() {
      const { data, error } = await supabase.from('media').select('*').order('created_at', { ascending: false });
      if (error) {
        document.getElementById('mediaStatus').textContent = 'Error loading media.';
        return;
      }
      const container = document.getElementById('mediaContainer');
      if (!data || data.length === 0) {
        container.innerHTML = '<p style="color:#777; font-style:italic;">No media uploaded yet.</p>';
        return;
      }
      container.innerHTML = data.map(item => `
        <div class="media-item">
          ${item.type === 'image' 
            ? `<img src="${item.preview_url}" draggable="false" alt="${item.title}">`
            : `<video src="${item.preview_url}" muted loop style="width:50px;height:50px;object-fit:cover;border-radius:8px;margin-right:1rem;"></video>`}
          <div class="info">
            <h4>${item.title}</h4>
            <span>$${item.price}</span>
            ${item.is_free_sample ? ' 🎁 Free Sample' : ''}
          </div>
          <button class="delete-btn" data-id="${item.id}" data-original="${item.original_path}" data-preview="${item.preview_path}">Delete</button>
        </div>
      `).join('');

      // Attach delete handlers with logging
      container.querySelectorAll('.delete-btn').forEach(btn => {
        btn.addEventListener('click', async () => {
          const id = btn.dataset.id;
          const orig = btn.dataset.original;
          const prev = btn.dataset.preview;
          if (!confirm('Delete this media permanently?')) return;
          btn.disabled = true;
          btn.textContent = 'Deleting…';

          const { error: origErr } = await supabase.storage.from('originals').remove([orig]);
          if (origErr) {
            alert('Failed to delete original file: ' + origErr.message);
            btn.disabled = false; btn.textContent = 'Delete'; return;
          }
          const { error: prevErr } = await supabase.storage.from('previews').remove([prev]);
          if (prevErr) {
            alert('Failed to delete preview file: ' + prevErr.message);
            btn.disabled = false; btn.textContent = 'Delete'; return;
          }
          const { error: dbError } = await supabase.from('media').delete().eq('id', id);
          if (dbError) {
            alert('Failed to delete media record: ' + dbError.message);
            btn.disabled = false; btn.textContent = 'Delete'; return;
          }
          alert('✅ Media deleted successfully.');
          loadMedia();
        });
      });
    }

    // Load messages (Messages tab)
    async function loadMessages() {
      const { data, error } = await supabase
        .from('support_messages')
        .select('*')
        .order('created_at', { ascending: false });

      const container = document.getElementById('messagesContainer');
      if (error) {
        container.innerHTML = '<p style="color:#e91e63;">Error loading messages.</p>';
        return;
      }
      if (!data || data.length === 0) {
        container.innerHTML = '<p style="color:#777; font-style:italic;">No messages yet.</p>';
        return;
      }

      container.innerHTML = data.map(msg => `
        <div class="media-item message-item">
          <div class="message-header">
            <strong>${msg.user_email || 'Anonymous'}</strong>
            <small>${new Date(msg.created_at).toLocaleString()}</small>
          </div>
          ${msg.subject ? `<div class="message-subject">${msg.subject}</div>` : ''}
          <div class="message-body">${msg.message}</div>
        </div>
      `).join('');
    }

    // Upload handler (with free sample logic)
    document.getElementById('uploadBtn').addEventListener('click', async () => {
      const title = document.getElementById('title').value;
      const type = document.getElementById('type').value;
      const price = parseInt(document.getElementById('price').value);
      const original = document.getElementById('originalFile').files[0];
      const preview = document.getElementById('previewFile').files[0];
      const isFree = document.getElementById('freeSample').checked;
      if (!title || !original || !preview) return alert('Fill all fields');

      // Enforce 4 free sample limit per day
      if (isFree) {
        const today = new Date().toISOString().split('T')[0];
        const { count } = await supabase
          .from('media')
          .select('id', { count: 'exact' })
          .eq('is_free_sample', true)
          .eq('free_sample_date', today);
        if (count >= 4) {
          return alert('You have already uploaded 4 free samples today.');
        }
      }

      const status = document.getElementById('uploadStatus');
      status.textContent = 'Uploading…';

      try {
        const origPath = `${Date.now()}_original.${original.name.split('.').pop()}`;
        const { error: origErr } = await supabase.storage.from('originals').upload(origPath, original);
        if (origErr) throw origErr;

        const prevPath = `${Date.now()}_preview.${preview.name.split('.').pop()}`;
        const { error: prevErr } = await supabase.storage.from('previews').upload(prevPath, preview);
        if (prevErr) throw prevErr;

        const { data: { publicUrl } } = supabase.storage.from('previews').getPublicUrl(prevPath);

        const insertData = {
          title, type, price,
          original_path: origPath,
          preview_path: prevPath,
          preview_url: publicUrl,
          is_free_sample: isFree,
          free_sample_date: isFree ? new Date().toISOString().split('T')[0] : null
        };

        const { error: insertErr } = await supabase.from('media').insert(insertData);
        if (insertErr) throw insertErr;

        status.textContent = 'Upload successful!';
        document.getElementById('title').value = '';
        document.getElementById('originalFile').value = '';
        document.getElementById('previewFile').value = '';
        document.getElementById('freeSample').checked = false;
        loadMedia(); // refresh media list
      } catch (e) {
        status.textContent = 'Error: ' + e.message;
      }
    });

    // Support modal (same as other pages)
    const floatBtn = document.getElementById('supportFloatBtn');
    const overlay = document.getElementById('supportOverlay');
    const closeBtn = document.getElementById('closeSupportBtn');
    const sendBtn = document.getElementById('sendSupportBtn');
    const subjectInput = document.getElementById('supportSubject');
    const messageInput = document.getElementById('supportMessage');
    const supportStatus = document.getElementById('supportStatus');

    floatBtn.addEventListener('click', () => overlay.classList.add('active'));
    closeBtn.addEventListener('click', () => overlay.classList.remove('active'));
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('active'); });

    sendBtn.addEventListener('click', async () => {
      const msg = messageInput.value.trim();
      if (!msg) return alert('Please enter a message.');
      sendBtn.disabled = true; sendBtn.textContent = 'Sending…'; supportStatus.textContent = '';
      try {
        const session = await supabase.auth.getSession();
        if (!session.data.session) {
          alert('You must be logged in.');
          sendBtn.disabled = false; sendBtn.textContent = 'Send Message';
          return;
        }
        const token = session.data.session.access_token;
        const res = await fetch('https://bxmxlbyxobtkyihiiyug.supabase.co/functions/v1/support-message', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ subject: subjectInput.value.trim(), message: msg })
        });
        if (!res.ok) throw new Error('Failed');
        supportStatus.textContent = '✅ Message sent!';
        subjectInput.value = ''; messageInput.value = '';
        setTimeout(() => overlay.classList.remove('active'), 2000);
      } catch (e) {
        supportStatus.textContent = '❌ Error: ' + e.message;
      } finally {
        sendBtn.disabled = false; sendBtn.textContent = 'Send Message';
      }
    });

    // Initialize everything
    checkAdmin().then(() => {
      loadMedia();
      loadMessages();
    });
  </script>
</body>
</html>
