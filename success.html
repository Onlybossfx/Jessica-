<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Download</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
  <style>
    /* ========== Mobile‑first base ========== */
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
    }

    .container {
      width: 100%;
      max-width: 500px;
      margin: 1.5rem;
      padding: 2rem 1.5rem;
      background: #1a1a1a;
      border-radius: 20px;
      border: 1px solid #333;
      text-align: center;
      box-shadow: 0 15px 30px rgba(0,0,0,0.5);
      box-sizing: border-box;
    }

    .container h2 {
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      color: #e91e63;
    }

    .container p {
      color: #ccc;
      margin-bottom: 1.5rem;
      font-size: 1rem;
    }

    .btn-full {
      width: 100%;
      padding: 0.9rem;
      background: #e91e63;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    .btn-full:hover {
      background: #ff3366;
    }

    .btn-full:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ========== Tablet & desktop ========== */
    @media (min-width: 600px) {
      .container {
        margin: 2rem;
        padding: 2.5rem;
      }

      .container h2 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>Thank you! 🎉</h2>
    <p>Your download is ready.</p>
    <button class="btn-full" id="downloadZip">Download ZIP</button>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');
    if (!token) {
      document.body.innerHTML = '<div class="container"><p>Invalid download link.</p></div>';
    }

    document.getElementById('downloadZip').addEventListener('click', async () => {
      const btn = document.getElementById('downloadZip');
      btn.disabled = true;
      btn.textContent = 'Preparing ZIP…';

      const { data, error } = await supabase.functions.invoke('get-download-urls', {
        body: { download_token: token }
      });
      if (error || !data?.files) {
        btn.textContent = 'Error';
        alert(error?.message || 'Something went wrong');
        return;
      }

      const zip = new JSZip();
      const promises = data.files.map(file =>
        fetch(file.url)
          .then(res => res.blob())
          .then(blob => zip.file(file.name, blob))
      );
      await Promise.all(promises);
      const content = await zip.generateAsync({ type: 'blob' });
      saveAs(content, 'purchased_files.zip');
      btn.textContent = 'Download Complete';
    });

    requireAuth();  // ensure session still active
  </script>
</body>
</html>
