<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subscribe</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="https://checkout.flutterwave.com/v3.js"></script>
  <style>
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      margin: 0;
      flex-direction: column;
      padding: 2rem 1rem;
    }
    .container {
      text-align: center;
      max-width: 500px;
      width: 100%;
    }
    .plans {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin: 2rem 0;
    }
    @media (max-width: 450px) {
      .plans { grid-template-columns: 1fr; }
    }
    .plan-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 2rem 1rem;
      text-align: center;
      transition: transform 0.2s, border-color 0.2s;
      cursor: pointer;
    }
    .plan-card:hover { transform: translateY(-4px); border-color: #e91e63; }
    .plan-card .price {
      font-size: 2.5rem;
      font-weight: bold;
      color: #e91e63;
      margin: 0.5rem 0;
    }
    .plan-card .period {
      font-size: 1rem;
      color: #aaa;
    }
    .plan-card h3 {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }
    .btn-select {
      background: #e91e63;
      border: none;
      color: white;
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 1rem;
      width: 100%;
      font-size: 1rem;
    }
    .note {
      color: #aaa;
      margin-top: 1rem;
      font-size: 0.9rem;
    }
    .logout-link {
      color: #888;
      text-decoration: none;
      font-size: 0.9rem;
      margin-top: 1.5rem;
      display: inline-block;
    }
    #approx {
      display: none;
      color: #888;
      font-size: 0.9rem;
      margin-top: 0.3rem;
    }
  .discount{
    color: #e91e63;
    padding: 5px;
    border: 1px solid #e91e63;
    width: 100px;
    background-color: rgba(100,0,29,0.4);
    border-radius: 40px;
    margin-bottom: 0.5rem
  }
  </style>
</head>
<body>
  <div class="container">
    <h1>Unlock Premium Access</h1>
    <p>Choose a plan to continue</p>
    <div class="plans">
      <div class="plan-card" id="monthlyPlan">
        <h3>Monthly</h3>
        <div class="price">$100</div>
        <div class="period">per month</div>
        <div id="monthlyApprox" class="approx" style="display:none;"></div>
        <button class="btn-select" onclick="subscribe('monthly')">Choose Monthly</button>
      </div>
      <div class="plan-card" id="yearlyPlan">
        <h3>Yearly</h3>    
        <div class="price">$850</div><center>
        <p class="discount">Save $350</p></center>
        <div class="period">per year</div>
        <div id="yearlyApprox" class="approx" style="display:none;"></div>
        <button class="btn-select" onclick="subscribe('yearly')">Choose Yearly</button>
      </div>
    </div>
    <p class="note">Secure payment powered by Flutterwave</p>
    <p id="status"></p>
    <a href="login.html" class="logout-link" onclick="logout()">Log out</a>
  </div>

  <script>
    let userCurrency = 'USD';
    let conversionRate = 1;
    let approxDisplayed = false;

    const countryToCurrency = {
      NG: 'NGN', GH: 'GHS', KE: 'KES', ZA: 'ZAR', TZ: 'TZS',
      UG: 'UGX', US: 'USD', GB: 'GBP', DE: 'EUR', FR: 'EUR',
      IT: 'EUR', ES: 'EUR', NL: 'EUR', BE: 'EUR', CA: 'CAD',
    };

    async function detectLocationAndRate() {
      try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        userCurrency = countryToCurrency[data.country] || data.currency || 'USD';
      } catch {
        const region = (navigator.language || '').split('-')[1] || 'US';
        userCurrency = countryToCurrency[region] || 'USD';
      }

      if (userCurrency !== 'USD') {
        try {
          const rateRes = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
          const rateData = await rateRes.json();
          conversionRate = rateData.rates[userCurrency] || 1;
        } catch { conversionRate = 1; }

        // Show approximate local price on the cards
        const monthlyLocal = (100 * conversionRate).toFixed(0);
        const yearlyLocal = (850 * conversionRate).toFixed(0);
        document.getElementById('monthlyApprox').style.display = 'block';
        document.getElementById('monthlyApprox').textContent = `≈ ${monthlyLocal} ${userCurrency}`;
        document.getElementById('yearlyApprox').style.display = 'block';
        document.getElementById('yearlyApprox').textContent = `≈ ${yearlyLocal} ${userCurrency}`;
        approxDisplayed = true;
      }
    }

    async function subscribe(plan) {
      const btn = document.querySelectorAll('.btn-select');
      btn.forEach(b => b.disabled = true);
      document.getElementById('status').textContent = 'Processing payment...';

      try {
        const session = await supabase.auth.getSession();
        const token = session.data.session.access_token;
        const txRef = `SUB-${Date.now()}-${Math.random().toString(36).substr(2,9)}`;
        const amountUSD = plan === 'yearly' ? 100 : 10;
        const localAmount = amountUSD * conversionRate; // If USD, conversionRate is 1
        const email = (await supabase.auth.getUser()).data.user?.email;

        FlutterwaveCheckout({
          public_key: 'FLWPUBK-16d89a4f62f0b67b6c70460ccd39dd48-X', // Replace with your key
          tx_ref: txRef,
          amount: localAmount,
          currency: userCurrency,           // <-- local currency (NGN, KES, etc.)
          payment_options: 'card,banktransfer',
          customer: { email: email },
          callback: async (response) => {
            document.getElementById('status').textContent = 'Verifying payment...';
            const res = await fetch('https://bxmxlbyxobtkyihiiyug.supabase.co/functions/v1/subscribe-user', {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ plan: plan, tx_ref: response.tx_ref })
            });
            const result = await res.json();
            if (res.ok && result.success) {
              document.getElementById('status').textContent = 'Subscription active! Redirecting...';
              setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
            } else {
              document.getElementById('status').textContent = 'Subscription failed: ' + (result.error || 'Unknown error');
              btn.forEach(b => b.disabled = false);
            }
          },
          onclose: () => {
            btn.forEach(b => b.disabled = false);
            document.getElementById('status').textContent = '';
          }
        });
      } catch (e) {
        document.getElementById('status').textContent = 'Error: ' + e.message;
        document.querySelectorAll('.btn-select').forEach(b => b.disabled = false);
      }
    }

    requireAuth();
    detectLocationAndRate();
  </script>
</body>
</html>
