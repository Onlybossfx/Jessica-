<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <style>
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      margin: 0;
    }
    .auth-container {
      width: 100%;
      max-width: 400px;
      padding: 2rem 1.5rem;
      background: rgba(26,26,26,0.9);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid #333;
      text-align: center;
    }
    .auth-container h2 { margin-bottom: 1rem; color: #e91e63; }
    .auth-container p { color: #aaa; margin-bottom: 1.5rem; font-size: 0.95rem; }
    .input-group { margin-bottom: 1rem; text-align: left; }
    .input-group label { display: block; margin-bottom: 0.3rem; color: #aaa; }
    .input-group input {
      width: 100%;
      padding: 0.8rem;
      background: #222;
      border: 1px solid #444;
      border-radius: 10px;
      color: #fff;
      font-size: 1rem;
      box-sizing: border-box;
    }
    .btn-full {
      width: 100%;
      padding: 0.9rem;
      background: #e91e63;
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      font-size: 1.1rem;
      cursor: pointer;
    }
    .auth-link { text-align: center; margin-top: 1rem; color: #aaa; }
    .auth-link a { color: #e91e63; text-decoration: none; }
  </style>
</head>
<body>
  <div class="auth-container">
    <h2>Reset your password</h2>
    <p>Enter your email address and we'll send you a link to reset your password.</p>
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>
    </div>
    <button class="btn-full" id="resetBtn">Send Reset Link</button>
    <p class="auth-link"><a href="login.html">Back to login</a></p>
    <p id="status" style="margin-top:1rem;"></p>
  </div>

  <script>
    document.getElementById('resetBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      if (!email) return alert('Please enter your email.');
      const status = document.getElementById('status');
      status.textContent = 'Sending…';
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/reset-password.html',
      });
      if (error) {
        status.textContent = 'Error: ' + error.message;
      } else {
        status.textContent = '✅ If an account with that email exists, a reset link has been sent.';
      }
    });
  </script>
</body>
</html>
