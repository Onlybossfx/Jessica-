<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery – Jessica's Portfolio</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <style>
      /* ========== Mobile‑first base styles ========== */
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* Facebook header */
    .fb-header {
      position: relative;
    }
    .cover-photo {
      width: 100%;
      height: 120px;
      background-size: cover;
      background-position: center;
      border-bottom: 1px solid #333;
    }
    .profile-section {
      position: relative;
      height: 50px;
      padding-left: 120px;
    }
    .profile-pic {
      position: absolute;
      left: 10px;
      bottom: 5px;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid #1a1a1a;
      background: #333;
      object-fit: cover;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    .profile-name {
      position: absolute;
      left: 110px;
      bottom: 5px;
      font-size: 2rem;
      font-weight: 700;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 15px;
      background: rgba(10,10,10,0.95);
      border-bottom: 1px solid #222;
    }
    .nav-btn {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .nav-btn.cart {
      background: #e91e63;
      color: white;
      margin-right: 8px;
    }
    .nav-btn.logout {
      background: #333;
      color: #ddd;
    }
    .nav-btn.dashboard-link {
      background: transparent;
      color: #aaa;
      text-decoration: none;
      font-size: 0.9rem;
    }

    /* ---------- MASONRY GALLERY ---------- */
    .gallery-pinterest {
      column-count: 2;
      column-gap: 12px;
      padding: 16px 12px;
      margin: 0 auto;
    }

    .pin-card {
      break-inside: avoid;
      margin-bottom: 12px;
      background: #1e1e1e;
      border-radius: 16px;
      overflow: hidden;
      border: 3px solid transparent;
      transition: transform 0.2s, border 0.2s;
      cursor: pointer;
      position: relative;
    }
    .pin-card:hover {
      transform: scale(1.02);
    }
    .pin-card.selected {
      border-color: #e91e63;
    }
    .pin-card img,
    .pin-card video {
      width: 100%;
      display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    .pin-info {
      padding: 0.8rem;
    }
    .pin-info h4 {
      font-size: 1rem;
      margin-bottom: 0.2rem;
      z-index: 999
    }
    .price {
      color: #e91e63;
      font-weight: bold;
      z-index: 999
    }
    .media-overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, #000, rgba(0,0,0,0.5) 100%);
  z-index: 2;
  pointer-events: none;
}

    .desc {
      margin: 0 15px;
      font-size: 1rem;
      color: #F5DEF3;
    }
    .infor {
      margin: 10px 15px;
      font-size: 1rem;
      color: rgba(255,205,249,0.5);
    }

    .nothing-yet {
      column-span: all;
      text-align: center;
      padding: 3rem 1rem;
      color: #777;
      font-size: 1.2rem;
      font-style: italic;
      animation: fadeInUp 0.6s ease-out, pulseGlow 2.5s infinite ease-in-out;
    }
    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* Support floating button */
    .support-float-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #e91e63;
      color: white;
      border: none;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      font-size: 1.8rem;
      box-shadow: 0 4px 15px rgba(233,30,99,0.4);
      cursor: pointer;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .support-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .support-modal-overlay.active { display: flex; }
    .support-modal {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 1.5rem;
      width: 90%;
      max-width: 400px;
      position: relative;
    }
    .support-modal h3 { color: #e91e63; margin-top: 0; }
    .support-modal input,
    .support-modal textarea {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1rem;
      background: #222;
      border: 1px solid #444;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      box-sizing: border-box;
    }
    .support-modal textarea { height: 100px; resize: vertical; }
    .support-modal button {
      background: #e91e63;
      border: none;
      color: white;
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }
    .support-modal button:disabled { opacity: 0.5; }
    .support-modal .close-btn {
      background: transparent;
      border: none;
      color: #aaa;
      font-size: 1.5rem;
      position: absolute;
      top: 10px;
      right: 15px;
      cursor: pointer;
      width: auto;
      padding: 0;
    }

    /* Responsive columns */
    @media (min-width: 600px) {
      .cover-photo { height: 220px; }
      .profile-section { height: 80px; padding-left: 180px; }
      .profile-pic { width: 120px; height: 120px; left: 25px; bottom: 15px; }
      .profile-name { left: 165px; bottom: 40px; font-size: 1.8rem; }
      .gallery-pinterest { column-count: 3; column-gap: 16px; padding: 24px 20px; }
    }
    @media (min-width: 900px) {
      .cover-photo { height: 280px; }
      .profile-section { height: 90px; padding-left: 220px; }
      .profile-pic { width: 140px; height: 140px; left: 30px; bottom: 20px; border-width: 4px; }
      .profile-name { left: 200px; bottom: 50px; font-size: 2rem; }
      .gallery-pinterest { column-count: 4; column-gap: 18px; padding: 30px 24px; }
    }
    @media (min-width: 1200px) {
      .cover-photo { height: 320px; }
      .profile-pic { width: 150px; height: 150px; }
      .profile-name { font-size: 2.2rem; left: 210px; }
      .gallery-pinterest { column-count: 5; padding: 30px 32px; }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div><a href="dashboard.html" class="nav-btn" style="background:transparent; color:#aaa;">← Dashboard</a></div>
    <div>
      <a href="checkout.html" class="nav-btn cart" id="cartBtn">Cart (0)</a>
      <button class="nav-btn logout" onclick="logout()">Logout</button>
    </div>
  </div>

  <div class="fb-header">
    <div class="cover-photo" style="background-image: url('cover.jpg');"></div>
    <div class="profile-section">
      <img class="profile-pic" src="profile.jpg" alt="Profile" draggable="false">
      <h1 class="profile-name">Jessica</h1>
    </div>
    <p class="desc">Natural EE's ✨, best picks you've seen today❤️.</p>
    <p class="infor">Choose from a variety of specially picked photos and videos, made with love just for you.</p>
  </div>

  <div class="gallery-pinterest" id="gallery"></div>

  <!-- Support Floating Button & Modal -->
  <button class="support-float-btn" id="supportFloatBtn" title="Chat with support">💬</button>
  <div class="support-modal-overlay" id="supportOverlay">
    <div class="support-modal">
      <button class="close-btn" id="closeSupportBtn">&times;</button>
      <h3>Contact Support</h3>
      <input type="text" id="supportSubject" placeholder="Subject (optional)">
      <textarea id="supportMessage" placeholder="How can we help you?"></textarea>
      <button id="sendSupportBtn">Send Message</button>
      <p id="supportStatus" style="text-align:center; margin-top:0.5rem;"></p>
    </div>
  </div>

  <script>
    let selected = JSON.parse(localStorage.getItem('selectedMedia') || '[]');

    function updateCartDisplay() {
      const btn = document.getElementById('cartBtn');
      btn.textContent = `Cart (${selected.length})`;
      localStorage.setItem('selectedMedia', JSON.stringify(selected));
    }

    async function loadGallery() {
      await requireAuth();
      if (!await requireSubscription()) return;   // ← gate
      await ensureCartBelongsToCurrentUser();      // ← cart isolation
      selected = JSON.parse(localStorage.getItem('selectedMedia') || '[]'); // refresh in-memory array
      updateCartDisplay();

      const { data, error } = await supabase.from('media').select('*');
      if (error) { console.error(error); return; }
      const gallery = document.getElementById('gallery');
      if (!data || data.length === 0) {
        gallery.innerHTML = `<div class="nothing-yet">Nothing yet…</div>`;
        return;
      }
      gallery.innerHTML = data.map(item => `
        <div class="pin-card ${selected.includes(item.id) ? 'selected' : ''}" data-id="${item.id}">
          <div class="media-overlay"></div>
          ${item.type === 'image'
            ? `<img src="${item.preview_url}" draggable="false" alt="${item.title}">`
            : `<video src="${item.preview_url}" muted loop disablepictureinpicture oncontextmenu="return false;"></video>`}
          <div class="pin-info">
            <h4>${item.title}</h4>
            <span class="price">$${item.price}</span>
          </div>
        </div>
      `).join('');

      gallery.querySelectorAll('.pin-card').forEach(card => {
        card.addEventListener('click', () => {
          const id = parseInt(card.dataset.id);
          if (selected.includes(id)) {
            selected = selected.filter(s => s !== id);
            card.classList.remove('selected');
          } else {
            selected.push(id);
            card.classList.add('selected');
          }
          updateCartDisplay();
        });
      });
    }

    // Anti‑copy
    document.addEventListener('contextmenu', e => e.preventDefault());
    window.addEventListener('keydown', e => {
      if (e.key === 'PrintScreen' || (e.ctrlKey && (e.key === 's' || e.key === 'u'))) e.preventDefault();
    });

    // Support modal (same as dashboard)
    const floatBtn = document.getElementById('supportFloatBtn');
    const overlay = document.getElementById('supportOverlay');
    const closeBtn = document.getElementById('closeSupportBtn');
    const sendBtn = document.getElementById('sendSupportBtn');
    const subjectInput = document.getElementById('supportSubject');
    const messageInput = document.getElementById('supportMessage');
    const supportStatus = document.getElementById('supportStatus');

    floatBtn.addEventListener('click', () => overlay.classList.add('active'));
    closeBtn.addEventListener('click', () => overlay.classList.remove('active'));
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('active'); });

    sendBtn.addEventListener('click', async () => {
      const msg = messageInput.value.trim();
      if (!msg) return alert('Please enter a message.');
      sendBtn.disabled = true; sendBtn.textContent = 'Sending…'; supportStatus.textContent = '';
      try {
        const session = await supabase.auth.getSession();
        if (!session.data.session) { alert('You must be logged in.'); return; }
        const token = session.data.session.access_token;
        const res = await fetch('https://bxmxlbyxobtkyihiiyug.supabase.co/functions/v1/support-message', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
          body: JSON.stringify({ subject: subjectInput.value.trim(), message: msg })
        });
        if (!res.ok) throw new Error('Failed');
        supportStatus.textContent = '✅ Message sent!';
        subjectInput.value = ''; messageInput.value = '';
        setTimeout(() => overlay.classList.remove('active'), 2000);
      } catch (e) {
        supportStatus.textContent = '❌ Error: ' + e.message;
      } finally {
        sendBtn.disabled = false; sendBtn.textContent = 'Send Message';
      }
    });

    loadGallery();
  </script>
</body>
</html>
