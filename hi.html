<style>
    /* ========== Mobile‑first base styles ========== */
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
    }

    /* Facebook header */
    .fb-header {
      position: relative;
    }
    .cover-photo {
      width: 100%;
      height: 120px;               /* smaller on phones */
      background-size: cover;
      background-position: center;
      border-bottom: 1px solid #333;
    }
    .profile-section {
      position: relative;
      height: 50px;
      padding-left: 120px;         /* space for profile pic */
    }
    .profile-pic {
      position: absolute;
      left: 20px;
      bottom: 5px;
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid #1a1a1a;
      background: #333;
      object-fit: cover;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    .profile-name {
      position: absolute;
      left: 120px;
      bottom: 10px;
      font-size: 1.4rem;
      font-weight: 700;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 15px;
      background: rgba(10,10,10,0.95);
      border-bottom: 1px solid #222;
    }
    .nav-btn {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .nav-btn.cart {
      background: #e91e63;
      color: white;
      margin-right: 8px;
    }
    .nav-btn.logout {
      background: #333;
      color: #ddd;
    }

    /* ---------- Pinterest masonry (responsive columns) ---------- */
    .gallery-pinterest {
      column-count: 2;            /* 2 columns on phones */
      column-gap: 12px;
      padding: 16px 12px;
      margin: 0 auto;
    }

    .pin-card {
      break-inside: avoid;        /* prevent splitting between columns */
      margin-bottom: 12px;
      background: #1e1e1e;
      border-radius: 16px;
      overflow: hidden;
      border: 3px solid transparent;
      transition: transform 0.2s, border 0.2s;
      cursor: pointer;
      position: relative;
    }
    .pin-card:hover {
      transform: scale(1.02);
    }
    .pin-card.selected {
      border-color: #e91e63;
    }
    .pin-card img,
    .pin-card video {
      width: 100%;
      display: block;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
      /* let natural height create masonry */
    }
    .pin-info {
      padding: 0.8rem;
    }
    .pin-info h4 {
      font-size: 1rem;
      margin-bottom: 0.2rem;
    }
    .price {
      color: #e91e63;
      font-weight: bold;
    }
    /* Overlay to block right‑click/drag */
    .media-overlay {
      position: absolute;
      inset: 0;
      background: transparent;
      z-index: 2;
    }

    .desc{
      margin: 0 20px;
      font-size: 0.9rem;
      color: #ccc;
    }

    /* ======= Nothing yet placeholder ======= */
    .nothing-yet {
      column-span: all;
      text-align: center;
      padding: 3rem 1rem;
      color: #777;
      font-size: 1.2rem;
      font-style: italic;
      animation: fadeInUp 0.6s ease-out, pulseGlow 2.5s infinite ease-in-out;
    }

    @keyframes fadeInUp {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseGlow {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    /* ========== Tablet: 3 columns ========== */
    @media (min-width: 600px) {
      .cover-photo {
        height: 220px;
      }
      .profile-section {
        height: 80px;
        padding-left: 180px;
      }
      .profile-pic {
        width: 120px;
        height: 120px;
        left: 25px;
        bottom: 15px;
      }
      .profile-name {
        left: 165px;
        bottom: 40px;
        font-size: 1.8rem;
      }
      .gallery-pinterest {
        column-count: 3;
        column-gap: 16px;
        padding: 24px 20px;
      }
    }

    /* ========== Small desktop / large tablet: 4 columns ========== */
    @media (min-width: 900px) {
      .cover-photo {
        height: 280px;
      }
      .profile-section {
        height: 90px;
        padding-left: 220px;
      }
      .profile-pic {
        width: 140px;
        height: 140px;
        left: 30px;
        bottom: 20px;
        border-width: 4px;
      }
      .profile-name {
        left: 200px;
        bottom: 50px;
        font-size: 2rem;
      }
      .gallery-pinterest {
        column-count: 4;
        column-gap: 18px;
        padding: 30px 24px;
      }
    }

    /* ========== Full desktop: 5 columns, no cramped width ========== */
    @media (min-width: 1200px) {
      .gallery-pinterest {
        column-count: 5;
        padding: 30px 32px;
      }
      .cover-photo {
        height: 320px;
      }
      .profile-pic {
        width: 150px;
        height: 150px;
      }
      .profile-name {
        font-size: 2.2rem;
        left: 210px;
      }
    }
  </style>
