<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fetch Test</title>
</head>
<body>
  <h2>Testing fetch to super-task</h2>
  <button id="testBtn">Test Fetch</button>
  <pre id="result"></pre>

  <script>
    document.getElementById('testBtn').onclick = async () => {
      const resultEl = document.getElementById('result');
      resultEl.textContent = 'Sending…';
      try {
        const res = await fetch('https://bxmxlbyxobtkyihiiyug.supabase.co/functions/v1/super-task', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ test: true })
        });
        const text = await res.text();
        resultEl.textContent = 'Status: ' + res.status + '\n' + text;
      } catch (e) {
        resultEl.textContent = 'FETCH ERROR: ' + e.message;
      }
    };
  </script>
</body>
</html>
