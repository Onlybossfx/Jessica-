<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <style>
    body {
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      margin: 0;
    }
    .auth-container {
      width: 100%;
      max-width: 400px;
      padding: 2rem 1.5rem;
      backdrop-filter: blur(10px);
      border-radius: 20px;
      border: 1px solid #333;
      margin: 20px
    }
    .auth-container h2 { text-align: center; margin-bottom: 1.5rem; }
    .input-group { margin-bottom: 1rem; }
    .input-group label { display: block; margin-bottom: 0.3rem; color: #aaa; }
    .input-group input {
      width: 100%;
      padding: 0.8rem;
      background: #fff;
      border: 1px solid #444;
      border-radius: 10px;
      color: #e91e63;
      font-size: 1rem;
      box-sizing: border-box;
    }
    .btn-full {
      width: 100%;
      padding: 0.9rem;
      background: #e91e63;
      border: none;
      border-radius: 10px;
      color: white;
      font-weight: bold;
      font-size: 1.1rem;
      cursor: pointer;
    }
    .auth-link { text-align: center; margin-top: 1rem; color: #aaa; }
    .auth-link a { color: #e91e63; text-decoration: none; }
  </style>
</head>
<body>
  <div class="auth-container">
    <h2>Create Account</h2>
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 6 characters" required>
    </div>
    <button class="btn-full" id="registerBtn">Sign Up</button>
    <p class="auth-link">Already have an account? <a href="login.html">Log in</a></p>
  </div>

  <script>
    redirectIfLoggedIn();

    document.getElementById('registerBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const { data, error } = await supabase.auth.signUp({ email, password });
      if (error) return alert(error.message);
      
      // Set cart owner to new user and clear any old cart
      if (data.user) {
        localStorage.setItem('cartOwnerId', data.user.id);
        localStorage.removeItem('selectedMedia');
      }
      
      alert('Registration successful! Please subscribe to continue.');
      window.location.href = 'subscribe.html';
    });
  </script>
</body>
</html>
