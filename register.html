<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <style>
  /* ===== Mobile responsiveness for auth pages ===== */
html, body {
  margin: 0;
  padding: 0;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;               /* respects iOS Safari bottom bar */
  font-family: system-ui, -apple-system, sans-serif;
  color: #fff;
}

.auth-container {
  width: 100%;
  max-width: 400px;
  margin: 1rem;                    /* prevent touching screen edges */
  padding: 2rem 1.5rem;
  border: 1px solid #333;
  border-radius: 20px;
  box-shadow: 0 15px 30px rgba(0,0,0,0.5);
}

.auth-container h2 {
  text-align: center;
  font-size: 1.8rem;
  margin-bottom: 1.5rem;
}

.input-group {
  margin-bottom: 1.2rem;
}

.input-group label {
  display: block;
  margin-bottom: 0.4rem;
  color: #aaa;
  font-size: 0.9rem;
}

.input-group input {
  width: 100%;
  padding: 0.85rem;
  font-size: 1rem;
  border: 1px solid #444;
  border-radius: 10px;
  outline: none;
  transition: border 0.2s;
  -webkit-appearance: none;   /* removes iOS inner shadow */
  box-sizing: border-box;     /* ensures padding doesn't break width */
}

.input-group input:focus {
  border-color: #e91e63;
}

.btn-full {
  width: 100%;
  padding: 0.9rem;
  background: #e91e63;
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 1.1rem;
  font-weight: bold;
  cursor: pointer;
  margin-top: 0.5rem;
  transition: background 0.2s;
}

.btn-full:hover {
  background: #ff3366;
}

.auth-link {
  text-align: center;
  margin-top: 1.2rem;
  color: #aaa;
  font-size: 0.95rem;
}

.auth-link a {
  color: #e91e63;
  text-decoration: none;
}

/* Small extra padding for tablets and up */
@media (min-width: 600px) {
  .auth-container {
    padding: 2.5rem;
  }
}
  </style>
</head>
<body>
  <div class="auth-container">
    <h2>Create Account</h2>
    <div class="input-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" required>
    </div>
    <div class="input-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="Min 6 characters" required>
    </div>
    <button class="btn-full" id="registerBtn">Sign Up</button>
    <p class="auth-link">Already have an account? <a href="login.html">Log in</a></p>
  </div>
  <script>
    redirectIfLoggedIn();

    document.getElementById('registerBtn').addEventListener('click', async () => {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const { error } = await supabase.auth.signUp({ email, password });
      if (error) return alert(error.message);
      alert('Registration successful! You can now log in.');
      window.location.href = 'login.html';
    });
  </script>
</body>
</html>
