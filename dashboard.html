<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <style>
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
    }
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 20px;
      background: rgba(10,10,10,0.95);
      border-bottom: 1px solid #222;
    }
    .navbar h2 { color: #e91e63; margin: 0; font-size: 1.3rem; }
    .nav-btn {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      background: #333;
      color: #ddd;
    }
    .dashboard-container {
      max-width: 700px;
      margin: 2rem auto;
      padding: 0 1.2rem;
    }

    /* Welcome section */
    .welcome {
      text-align: center;
      margin-bottom: 2rem;
    }
    .welcome h1 {
      font-size: 2rem;
      margin-bottom: 0.3rem;
    }
    .welcome .highlight {
      color: #e91e63;
    }
    .welcome p {
      color: #aaa;
      font-size: 1.1rem;
      margin-bottom: 1.5rem;
    }

    /* Action cards */
    .action-cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 2.5rem;
    }
    .action-card {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 1.5rem 1rem;
      text-align: center;
      border: 1px solid #333;
      cursor: pointer;
      transition: transform 0.2s, border-color 0.2s;
      text-decoration: none;
      color: inherit;
    }
    .action-card:hover {
      transform: translateY(-3px);
      border-color: #e91e63;
    }
    .action-card .icon {
      font-size: 2.2rem;
      margin-bottom: 0.8rem;
    }
    .action-card h3 {
      margin: 0;
      font-size: 1.1rem;
      color: #fff;
    }
    .action-card p {
      margin: 0.3rem 0 0;
      font-size: 0.85rem;
      color: #888;
    }

    /* Stats section */
    .stats {
      background: #1a1a1a;
      border-radius: 16px;
      padding: 1.5rem;
      border: 1px solid #333;
      margin-bottom: 2rem;
      text-align: center;
    }
    .stats .amount {
      font-size: 2.2rem;
      font-weight: bold;
      color: #e91e63;
    }
    .stats .label {
      font-size: 0.9rem;
      color: #aaa;
      margin-top: 0.2rem;
    }

    /* Recent purchases list */
    .purchases-section {
      margin-top: 2rem;
    }
    .section-title {
      font-size: 1.2rem;
      margin-bottom: 1rem;
      color: #e91e63;
    }
    .purchase-card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 0.9rem 1rem;
      margin-bottom: 0.8rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      border: 1px solid #333;
    }
    .purchase-info h4 { margin: 0 0 0.2rem; font-size: 0.95rem; }
    .purchase-info p { margin: 0; color: #aaa; font-size: 0.8rem; }
    .download-link {
      background: #e91e63;
      color: white;
      text-decoration: none;
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-weight: 600;
      font-size: 0.85rem;
    }
    .empty {
      color: #777;
      font-style: italic;
      text-align: center;
      padding: 2rem 0;
    }

    /* Support floating button (same as before) */
    .support-float-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #e91e63;
      color: white;
      border: none;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      font-size: 1.8rem;
      box-shadow: 0 4px 15px rgba(233,30,99,0.4);
      cursor: pointer;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .support-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .support-modal-overlay.active { display: flex; }
    .support-modal {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 1.5rem;
      width: 90%;
      max-width: 400px;
      position: relative;
    }
    .support-modal h3 { color: #e91e63; margin-top: 0; }
    .support-modal input,
    .support-modal textarea {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1rem;
      background: #222;
      border: 1px solid #444;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      box-sizing: border-box;
    }
    .support-modal textarea { height: 100px; resize: vertical; }
    .support-modal button {
      background: #e91e63;
      border: none;
      color: white;
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }
    .support-modal button:disabled { opacity: 0.5; }
    .support-modal .close-btn {
      background: transparent;
      border: none;
      color: #aaa;
      font-size: 1.5rem;
      position: absolute;
      top: 10px;
      right: 15px;
      cursor: pointer;
      width: auto;
      padding: 0;
    }

    @media (min-width: 600px) {
      .navbar { padding: 14px 24px; }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <h2>Dashboard</h2>
    <button class="nav-btn" onclick="logout()">Logout</button>
  </div>

  <div class="dashboard-container">
    <!-- Welcome message (filled by JS) -->
    <div class="welcome">
      <h1>Hello, <span id="userName" class="highlight">friend</span></h1>
      <p>Nice to have you back my love. What are we doing today?</p>
    </div>

    <!-- Quick actions -->
    <div class="action-cards">
      <a href="gallery.html" class="action-card">
        <div class="icon"><i class="fa-solid fa-images"></i></div>
        <h3>Browse New</h3>
        <p>Discover fresh sexy content</p>
      </a>
      <div class="action-card" onclick="scrollToPurchases()">
        <div class="icon"><i class="fa-solid fa-download"></i></div>
        <h3>My Downloads</h3>
        <p>View purchased items</p>
      </div>
    </div>

    <!-- Spending stats -->
    <div class="stats">
      <div class="amount" id="totalSpent">$0.00</div>
      <div class="label">Total spent so far</div>
    </div>

    <!-- Recent purchases (same as before) -->
    <div class="purchases-section" id="purchasesSection">
      <h3 class="section-title">Recent Purchases</h3>
      <div id="purchasesList"></div>
    </div>
  </div>

  <!-- Support Floating Button & Modal -->
  <button class="support-float-btn" id="supportFloatBtn" title="Chat with support">💬</button>
  <div class="support-modal-overlay" id="supportOverlay">
    <div class="support-modal">
      <button class="close-btn" id="closeSupportBtn">&times;</button>
      <h3>Contact Support</h3>
      <input type="text" id="supportSubject" placeholder="Subject (optional)">
      <textarea id="supportMessage" placeholder="How can we help you?"></textarea>
      <button id="sendSupportBtn">Send Message</button>
      <p id="supportStatus" style="text-align:center; margin-top:0.5rem;"></p>
    </div>
  </div>

  <script>
    async function loadDashboard() {
      await requireAuth();
      const user = await getCurrentUser();
      
      // Friendly name from email (e.g. "jessica" from "jessica@example.com")
      let name = 'friend';
      if (user?.email) {
        const localPart = user.email.split('@')[0];
        if (localPart) {
          name = localPart.charAt(0).toUpperCase() + localPart.slice(1);
        }
      }
      document.getElementById('userName').textContent = name;

      // Calculate total spent
      const { data: orders, error: orderError } = await supabase
        .from('orders')
        .select('id, amount, created_at, download_token, status')
        .eq('status', 'paid')
        .order('created_at', { ascending: false });

      if (orderError) {
        console.error(orderError);
        return;
      }

      const totalSpent = orders.reduce((sum, o) => sum + o.amount, 0);
      document.getElementById('totalSpent').textContent = `$${totalSpent.toFixed(2)}`;

      // Recent purchases list (max 10)
      const recentOrders = orders.slice(0, 10);
      const purchasesDiv = document.getElementById('purchasesList');
      if (recentOrders.length === 0) {
        purchasesDiv.innerHTML = '<div class="empty">No purchases yet. Browse new content above!</div>';
        return;
      }

      purchasesDiv.innerHTML = '';
      for (const order of recentOrders) {
        const { count } = await supabase
          .from('order_items')
          .select('id', { count: 'exact' })
          .eq('order_id', order.id);
        
        const card = document.createElement('div');
        card.className = 'purchase-card';
        card.innerHTML = `
          <div class="purchase-info">
            <h4>Order #${order.id}</h4>
            <p>${count} item${count !== 1 ? 's' : ''} · ${new Date(order.created_at).toLocaleDateString()} · $${order.amount}</p>
          </div>
          <a href="success.html?token=${order.download_token}" class="download-link">Download</a>
        `;
        purchasesDiv.appendChild(card);
      }
    }

    function scrollToPurchases() {
      document.getElementById('purchasesSection').scrollIntoView({ behavior: 'smooth' });
    }

    // Support modal (same as other pages)
    const floatBtn = document.getElementById('supportFloatBtn');
    const overlay = document.getElementById('supportOverlay');
    const closeBtn = document.getElementById('closeSupportBtn');
    const sendBtn = document.getElementById('sendSupportBtn');
    const subjectInput = document.getElementById('supportSubject');
    const messageInput = document.getElementById('supportMessage');
    const supportStatus = document.getElementById('supportStatus');

    floatBtn.addEventListener('click', () => overlay.classList.add('active'));
    closeBtn.addEventListener('click', () => overlay.classList.remove('active'));
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('active'); });

    sendBtn.addEventListener('click', async () => {
      const msg = messageInput.value.trim();
      if (!msg) return alert('Please enter a message.');
      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending…';
      supportStatus.textContent = '';
      try {
        const session = await supabase.auth.getSession();
        if (!session.data.session) {
          alert('You must be logged in.');
          sendBtn.disabled = false;
          sendBtn.textContent = 'Send Message';
          return;
        }
        const token = session.data.session.access_token;
        const res = await fetch('https://bxmxlbyxobtkyihiiyug.supabase.co/functions/v1/support-message', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ subject: subjectInput.value.trim(), message: msg })
        });
        if (!res.ok) throw new Error('Failed');
        supportStatus.textContent = '✅ Message sent!';
        subjectInput.value = '';
        messageInput.value = '';
        setTimeout(() => overlay.classList.remove('active'), 2000);
      } catch (e) {
        supportStatus.textContent = '❌ Error: ' + e.message;
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send Message';
      }
    });

    loadDashboard();
  </script>
</body>
</html>
