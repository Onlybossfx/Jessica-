<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="https://checkout.flutterwave.com/v3.js"></script>
  <style>
    /* ... keep your existing styles ... */
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
    }
    .navbar { ... } /* your existing styles */
    .container { ... }
    /* --- Debug panel (visible on phone) --- */
    #debugLog {
      background: #111;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 12px;
      margin: 16px auto;
      max-width: 600px;
      font-family: monospace;
      font-size: 0.8rem;
      color: #0f0;
      white-space: pre-wrap;
      word-break: break-all;
      height: 150px;
      overflow-y: auto;
    }
    .btn-full { ... }
    #status { ... }
  </style>
</head>
<body>
  <div class="navbar">
    <h2 style="color:#e91e63;">Checkout</h2>
    <button class="nav-btn logout" onclick="logout()">Logout</button>
  </div>
  <div class="container">
    <h2>Your Selection</h2>
    <div id="itemsList"></div>
    <div class="total">
      Total: <span id="totalAmount">$0.00</span>
      <span id="approx" class="approx" style="display:none;"></span>
    </div>
    <button class="btn-full" id="payBtn" disabled>Pay now</button>
    <p id="status" style="text-align:center; margin-top:1rem;"></p>
  </div>

  <!-- Debug log visible on the page -->
  <div id="debugLog">[LOG] Waiting for interaction...</div>

  <script>
    // Simple logger that also writes to the page
    function log(msg) {
      const el = document.getElementById('debugLog');
      el.textContent += '\n' + new Date().toLocaleTimeString() + ' - ' + msg;
      el.scrollTop = el.scrollHeight;
      console.log(msg);
    }

    const selected = JSON.parse(localStorage.getItem('selectedMedia') || '[]');
    let totalUSD = 0;
    let mediaItems = [];
    let userCurrency = 'USD';
    let userCountry = 'US';
    let conversionRate = 1;

    const countryToCurrency = {
      NG: 'NGN', GH: 'GHS', KE: 'KES', ZA: 'ZAR', TZ: 'TZS',
      UG: 'UGX', US: 'USD', GB: 'GBP', DE: 'EUR', FR: 'EUR',
      IT: 'EUR', ES: 'EUR', NL: 'EUR', BE: 'EUR', CA: 'CAD',
    };

    async function detectLocation() {
      try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        userCountry = data.country || 'US';
        userCurrency = countryToCurrency[data.country] || data.currency || 'USD';
      } catch {
        const region = (navigator.language || '').split('-')[1] || 'US';
        userCountry = region;
        userCurrency = countryToCurrency[region] || 'USD';
      } } // same as before
  
    async function getExchangeRate(from = 'USD', to = 'USD') {
      if (from === to) return 1;
      try {
        const res = await fetch(`https://api.exchangerate-api.com/v4/latest/${from}`);
        const data = await res.json();
        return data.rates[to] || 1;
      } catch { return 1; }
    }
  
  function formatCurrency(amount, currency) {
      return new Intl.NumberFormat(navigator.language, {
        style: 'currency', currency
      }).format(amount);
    }
  
    function getPaymentOptions(countryCode, currencyCode) {
      let options = ['card']; // Card payments are accepted almost everywhere
      if (countryCode === 'NG' && currencyCode === 'NGN') {
        options.push('banktransfer', 'ussd', 'account', 'qr');
      } else if (countryCode === 'KE' && currencyCode === 'KES') {
        options.push('mpesa');
      } else if (countryCode === 'GH' && currencyCode === 'GHS') {
        options.push('mobilemoneyghana');
      } else if (['TZ', 'UG', 'RW', 'ZM'].includes(countryCode)) {
        options.push('mobilemoney' + countryCode.toLowerCase());
      } else {
        // For the US, UK, EU and others, bank transfer is also an option
        options.push('banktransfer');
      }
      return options.join(', ');
    }

    async function loadCheckout() {
      await requireAuth();
      log('Checkout loading...');
      if (selected.length === 0) {
        document.getElementById('itemsList').innerHTML = '<p>No items selected. <a href="gallery.html">Go back</a></p>';
        return;
      }

      document.getElementById('status').textContent = 'Detecting location…';
      await detectLocation();
      conversionRate = await getExchangeRate('USD', userCurrency);
      log('User location: ' + userCountry + ', currency: ' + userCurrency + ', rate: ' + conversionRate);
      document.getElementById('status').textContent = '';

      const { data, error } = await supabase.from('media').select('*').in('id', selected);
      if (error) {
        log('ERROR fetching media: ' + error.message);
        return;
      }
      mediaItems = data;

      const list = document.getElementById('itemsList');
      list.innerHTML = data.map(item => {
        const priceLocal = item.price * conversionRate;
        return `<div class="checkout-item">
          <span>${item.title} (${item.type})</span>
          <span>${formatCurrency(priceLocal, userCurrency)}</span>
        </div>`;
      }).join('');

      totalUSD = data.reduce((s, item) => s + item.price, 0);
      const totalLocal = totalUSD * conversionRate;
      document.getElementById('totalAmount').textContent = formatCurrency(totalLocal, userCurrency);
      if (userCurrency !== 'USD') {
        document.getElementById('approx').style.display = 'inline';
        document.getElementById('approx').textContent = `(~ ${formatCurrency(totalUSD, 'USD')})`;
      }
      document.getElementById('payBtn').disabled = false;
      log('Checkout ready. Pay button enabled.');
    }

    document.getElementById('payBtn').addEventListener('click', async () => {
      const btn = document.getElementById('payBtn');
      btn.disabled = true;
      btn.textContent = 'Processing…';
      log('Pay button clicked. Calling create-order...');

      try {
        const session = await supabase.auth.getSession();
        const token = session.data.session.access_token;
        if (!token) {
          log('ERROR: No access token. You may need to log in again.');
          btn.disabled = false;
          btn.textContent = 'Pay now';
          return;
        }

        // DEBUG: show the URL we're about to call
document.getElementById('debugLog').textContent += '\nFETCH URL: https://bxmxlbyxobtkyihiiyug.supabase.co/functions/v1/create-order';
        
        // IMPORTANT: Replace YOUR-PROJECT-ID with your Supabase project ID
        const response = await fetch('https://bxmxlbyxobtkyihiiyug.supabase.co/functions/v1/super-task', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ media_ids: selected, amount: totalUSD })
        });

        if (!response.ok) {
          let errorText = 'Request failed';
          try {
            const errorData = await response.json();
            errorText = errorData.error || JSON.stringify(errorData);
          } catch (e) {}
          log('ERROR from create-order: ' + response.status + ' ' + errorText);
          alert('Failed to create order: ' + errorText);
          btn.disabled = false;
          btn.textContent = 'Pay now';
          return;
        }

        const orderData = await response.json();
        log('Order created: ' + orderData.tx_ref);
        const localTotal = totalUSD * conversionRate;
        const paymentOptions = getPaymentOptions(userCountry, userCurrency);
        log('Opening Flutterwave with currency=' + userCurrency + ' amount=' + localTotal + ' options=' + paymentOptions);

        FlutterwaveCheckout({
          public_key: 'FLWPUBK-4ca7ef88c315734165f76ea3c96752e7-X', // Replace with your live public key
          tx_ref: orderData.tx_ref,
          amount: localTotal,
          currency: userCurrency,
          payment_options: paymentOptions,
          customer: {
            email: (await supabase.auth.getUser()).data.user?.email,
          },
          callback: async (response) => {
            log('Flutterwave callback received: ' + response.transaction_id);
            try {
              const verifyRes = await fetch('https://bxmxlbyxobtkyihiiyug.supabase.co/functions/v1/super-processor', {
                method: 'POST',
                headers: {
                  'Authorization': 'Bearer ' + token,
                  'Content-Type': 'application/json'
                },
                body: JSON.stringify({ tx_ref: orderData.tx_ref, transaction_id: response.transaction_id })
              });
              const verify = await verifyRes.json();
              if (!verifyRes.ok || verify.status !== 'success') {
                log('Verification failed: ' + JSON.stringify(verify));
                alert('Payment verification failed');
                return;
              }
              log('Payment verified, redirecting to download...');
              window.location.href = `success.html?token=${verify.download_token}`;
            } catch (e) {
              log('Verification error: ' + e.message);
              alert('Verification error: ' + e.message);
            }
          },
          onclose: () => {
            log('Flutterwave modal closed');
            btn.disabled = false;
            btn.textContent = 'Pay now';
          }
        });
      } catch (e) {
        log('UNEXPECTED ERROR: ' + e.message);
        alert('Error: ' + e.message);
        btn.disabled = false;
        btn.textContent = 'Pay now';
      }
    });

    loadCheckout();
  </script>
</body>
</html>
