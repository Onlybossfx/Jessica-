<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="https://checkout.flutterwave.com/v3.js"></script>
  <style>
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
    }
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      background: rgba(10,10,10,0.95);
      border-bottom: 1px solid #222;
    }
    .navbar h2 { color: #e91e63; margin: 0; font-size: 1.3rem; }
    .nav-btn {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
      background: #333;
      color: #ddd;
    }
    .container {
      max-width: 600px;
      margin: 2rem auto;
      padding: 1rem;
    }
    .checkout-item {
      display: flex;
      align-items: center;
      background: #1a1a1a;
      border-radius: 16px;
      padding: 0.8rem;
      margin-bottom: 1rem;
      border: 1px solid #333;
      position: relative;
    }
    .checkout-item img, .checkout-item video {
      width: 80px;
      height: 80px;
      object-fit: cover;
      border-radius: 10px;
      margin-right: 1rem;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    .item-details {
      flex: 1;
    }
    .item-details h4 {
      margin: 0 0 0.3rem;
      font-size: 1rem;
    }
    .item-details .price {
      color: #e91e63;
      font-weight: bold;
    }
    .remove-btn {
      background: transparent;
      border: 1px solid #e91e63;
      color: #e91e63;
      border-radius: 20px;
      padding: 0.3rem 0.8rem;
      font-size: 0.8rem;
      cursor: pointer;
      font-weight: 600;
    }
    .total-section {
      text-align: right;
      margin: 1.5rem 0;
      font-size: 1.3rem;
      font-weight: bold;
    }
    .btn-full {
      width: 100%;
      padding: 0.9rem;
      background: #e91e63;
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-full:disabled { opacity: 0.5; cursor: not-allowed; }
    #approx { color: #888; font-size: 0.85rem; font-weight: normal; }
    #status { text-align: center; margin-top: 1rem; color: #aaa; }

    /* Support floating button */
    .support-float-btn {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #e91e63;
      color: white;
      border: none;
      border-radius: 50%;
      width: 56px;
      height: 56px;
      font-size: 1.8rem;
      box-shadow: 0 4px 15px rgba(233,30,99,0.4);
      cursor: pointer;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .support-modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      z-index: 2000;
      align-items: center;
      justify-content: center;
    }
    .support-modal-overlay.active { display: flex; }
    .support-modal {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 1.5rem;
      width: 90%;
      max-width: 400px;
      position: relative;
    }
    .support-modal h3 { color: #e91e63; margin-top: 0; }
    .support-modal input,
    .support-modal textarea {
      width: 100%;
      padding: 0.8rem;
      margin-bottom: 1rem;
      background: #222;
      border: 1px solid #444;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      box-sizing: border-box;
    }
    .support-modal textarea { height: 100px; resize: vertical; }
    .support-modal button {
      background: #e91e63;
      border: none;
      color: white;
      padding: 0.7rem 1.5rem;
      border-radius: 10px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
    }
    .support-modal button:disabled { opacity: 0.5; }
    .support-modal .close-btn {
      background: transparent;
      border: none;
      color: #aaa;
      font-size: 1.5rem;
      position: absolute;
      top: 10px;
      right: 15px;
      cursor: pointer;
      width: auto;
      padding: 0;
    }
    @media (min-width: 600px) {
      .navbar { padding: 14px 24px; }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <h2>Checkout</h2>
    <button class="nav-btn" onclick="logout()">Logout</button>
  </div>
  <div class="container">
    <h2 style="margin-bottom:1rem;">Your Selection</h2>
    <div id="itemsContainer"></div>
    <div class="total-section">
      Total: <span id="totalAmount">$0.00</span>
      <span id="approx" style="display:none; margin-left:0.5rem;"></span>
    </div>
    <button class="btn-full" id="payBtn" disabled>Pay now</button>
    <p id="status"></p>
  </div>

  <!-- Support Floating Button & Modal -->
  <button class="support-float-btn" id="supportFloatBtn" title="Chat with support">💬</button>
  <div class="support-modal-overlay" id="supportOverlay">
    <div class="support-modal">
      <button class="close-btn" id="closeSupportBtn">&times;</button>
      <h3>Contact Support</h3>
      <input type="text" id="supportSubject" placeholder="Subject (optional)">
      <textarea id="supportMessage" placeholder="How can we help you?"></textarea>
      <button id="sendSupportBtn">Send Message</button>
      <p id="supportStatus" style="text-align:center; margin-top:0.5rem;"></p>
    </div>
  </div>

  <script>
    let selected = JSON.parse(localStorage.getItem('selectedMedia') || '[]');
    let mediaItems = [];
    let totalUSD = 0;
    let userCurrency = 'USD';
    let conversionRate = 1;

    const countryToCurrency = {
      NG: 'NGN', GH: 'GHS', KE: 'KES', ZA: 'ZAR', TZ: 'TZS',
      UG: 'UGX', US: 'USD', GB: 'GBP', DE: 'EUR', FR: 'EUR',
      IT: 'EUR', ES: 'EUR', NL: 'EUR', BE: 'EUR', CA: 'CAD',
    };

    async function detectLocation() {
      try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        userCurrency = countryToCurrency[data.country] || data.currency || 'USD';
      } catch {
        const region = (navigator.language || '').split('-')[1] || 'US';
        userCurrency = countryToCurrency[region] || 'USD';
      }
    }

    async function getExchangeRate(from = 'USD', to = 'USD') {
      if (from === to) return 1;
      try {
        const res = await fetch(`https://api.exchangerate-api.com/v4/latest/${from}`);
        const data = await res.json();
        return data.rates[to] || 1;
      } catch { return 1; }
    }

    function formatCurrency(amount, currency) {
      return new Intl.NumberFormat(navigator.language, { style: 'currency', currency }).format(amount);
    }

    function removeItem(mediaId) {
      selected = selected.filter(id => id !== mediaId);
      localStorage.setItem('selectedMedia', JSON.stringify(selected));
      renderItems();
    }

    function renderItems() {
      const container = document.getElementById('itemsContainer');
      if (selected.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:#aaa; padding:2rem;">No items selected. <a href="gallery.html" style="color:#e91e63;">Browse gallery</a></p>';
        document.getElementById('payBtn').disabled = true;
        document.getElementById('totalAmount').textContent = formatCurrency(0, userCurrency);
        document.getElementById('approx').style.display = 'none';
        return;
      }

      const itemsHtml = mediaItems
        .filter(item => selected.includes(item.id))
        .map(item => {
          const priceLocal = item.price * conversionRate;
          return `
            <div class="checkout-item">
              ${item.type === 'image' 
                ? `<img src="${item.preview_url}" draggable="false" alt="${item.title}">`
                : `<video src="${item.preview_url}" muted loop></video>`}
              <div class="item-details">
                <h4>${item.title}</h4>
                <span class="price">${formatCurrency(priceLocal, userCurrency)}</span>
              </div>
              <button class="remove-btn" onclick="removeItem(${item.id})">Remove</button>
            </div>
          `;
        }).join('');

      container.innerHTML = itemsHtml;

      const remainingItems = mediaItems.filter(item => selected.includes(item.id));
      totalUSD = remainingItems.reduce((s, item) => s + item.price, 0);
      const totalLocal = totalUSD * conversionRate;
      document.getElementById('totalAmount').textContent = formatCurrency(totalLocal, userCurrency);
      if (userCurrency !== 'USD') {
        document.getElementById('approx').style.display = 'inline';
        document.getElementById('approx').textContent = `(~ ${formatCurrency(totalUSD, 'USD')})`;
      } else {
        document.getElementById('approx').style.display = 'none';
      }

      document.getElementById('payBtn').disabled = false;
    }

      async function loadCheckout() {
      await requireAuth();
      if (!await requireSubscription()) return;   // ← gate
      await ensureCartBelongsToCurrentUser();
      // refresh selected from localStorage after possible reset
      selected = JSON.parse(localStorage.getItem('selectedMedia') || '[]');
      if (selected.length === 0) {
        document.getElementById('itemsContainer').innerHTML = '<p style="text-align:center; color:#aaa; padding:2rem;">No items selected. <a href="gallery.html">Browse gallery</a></p>';
        return;
      }

      document.getElementById('status').textContent = 'Detecting location…';
      await detectLocation();
      conversionRate = await getExchangeRate('USD', userCurrency);
      document.getElementById('status').textContent = '';

      const { data, error } = await supabase.from('media').select('*').in('id', selected);
      if (error) {
        alert(error.message);
        return;
      }
      mediaItems = data;
      renderItems();
    }

    document.getElementById('payBtn').addEventListener('click', async () => {
      const btn = document.getElementById('payBtn');
      btn.disabled = true;
      btn.textContent = 'Processing…';

      const session = await supabase.auth.getSession();
      const token = session.data.session.access_token;
      const response = await fetch('https://bxmxlbyxobtkyihiiyug.supabase.co/functions/v1/super-task', {
        method: 'POST',
        headers: {
          'Authorization': 'Bearer ' + token,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ media_ids: selected, amount: totalUSD })
      });

      if (!response.ok) {
        const err = await response.json();
        alert('Failed to create order: ' + (err.error || 'Request failed'));
        btn.disabled = false;
        btn.textContent = 'Pay now';
        return;
      }

      const orderData = await response.json();
      const localTotal = totalUSD * conversionRate;
      FlutterwaveCheckout({
        public_key: 'FLWPUBK-16d89a4f62f0b67b6c70460ccd39dd48-X',
        tx_ref: orderData.tx_ref,
        amount: localTotal,
        currency: userCurrency,
        payment_options: 'card,banktransfer',
        customer: {
          email: (await supabase.auth.getUser()).data.user?.email,
        },
        callback: async (response) => {
          try {
            const verifyRes = await fetch('https://bxmxlbyxobtkyihiiyug.supabase.co/functions/v1/super-processor', {
              method: 'POST',
              headers: {
                'Authorization': 'Bearer ' + token,
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({ tx_ref: orderData.tx_ref, transaction_id: response.transaction_id })
            });
            const verify = await verifyRes.json();
            if (!verifyRes.ok || verify.status !== 'success') {
              alert('Payment verification failed');
              return;
            }
            localStorage.removeItem('selectedMedia');
            window.location.href = `success.html?token=${verify.download_token}`;
          } catch (e) {
            alert('Verification error: ' + e.message);
          }
        },
        onclose: () => {
          btn.disabled = false;
          btn.textContent = 'Pay now';
        }
      });
    });

    // Support modal (same as other pages)
    const floatBtn = document.getElementById('supportFloatBtn');
    const overlay = document.getElementById('supportOverlay');
    const closeBtn = document.getElementById('closeSupportBtn');
    const sendBtn = document.getElementById('sendSupportBtn');
    const subjectInput = document.getElementById('supportSubject');
    const messageInput = document.getElementById('supportMessage');
    const supportStatus = document.getElementById('supportStatus');

    floatBtn.addEventListener('click', () => overlay.classList.add('active'));
    closeBtn.addEventListener('click', () => overlay.classList.remove('active'));
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('active'); });

    sendBtn.addEventListener('click', async () => {
      const msg = messageInput.value.trim();
      if (!msg) return alert('Please enter a message.');
      sendBtn.disabled = true;
      sendBtn.textContent = 'Sending…';
      supportStatus.textContent = '';
      try {
        const session = await supabase.auth.getSession();
        if (!session.data.session) {
          alert('You must be logged in.');
          sendBtn.disabled = false;
          sendBtn.textContent = 'Send Message';
          return;
        }
        const token = session.data.session.access_token;
        const res = await fetch('https://bxmxlbyxobtkyihiiyug.supabase.co/functions/v1/support-message', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + token,
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ subject: subjectInput.value.trim(), message: msg })
        });
        if (!res.ok) throw new Error('Failed');
        supportStatus.textContent = '✅ Message sent!';
        subjectInput.value = '';
        messageInput.value = '';
        setTimeout(() => overlay.classList.remove('active'), 2000);
      } catch (e) {
        supportStatus.textContent = '❌ Error: ' + e.message;
      } finally {
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send Message';
      }
    });

    loadCheckout();
  </script>
</body>
</html>
