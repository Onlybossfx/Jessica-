<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="https://checkout.flutterwave.com/v3.js"></script>
  <style>
    /* ========== Mobile‑first base ========== */
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: system-ui, -apple-system, sans-serif;
      margin: 0;
      padding: 0;
    }

    /* Navbar */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 14px;
      background: rgba(10,10,10,0.95);
      border-bottom: 1px solid #222;
      flex-wrap: wrap;
      gap: 8px;
    }
    .navbar h2 {
      font-size: 1.3rem;
      margin: 0;
    }
    .nav-btn {
      padding: 0.4rem 1rem;
      border-radius: 20px;
      font-weight: 600;
      border: none;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .nav-btn.logout {
      background: #333;
      color: #ddd;
    }

    /* Container */
    .container {
      width: 95%;
      max-width: 650px;
      margin: 24px auto;
      padding: 1.5rem 1rem;
      background: #1a1a1a;
      border-radius: 20px;
      border: 1px solid #333;
      box-sizing: border-box;
    }
    .container h2 {
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }

    /* Checkout items */
    .checkout-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
      border-bottom: 1px solid #333;
      flex-wrap: wrap;
      gap: 6px;
    }
    .checkout-item span:first-child {
      font-size: 0.95rem;
    }
    .checkout-item span:last-child {
      font-weight: 600;
      white-space: nowrap;
    }

    /* Total */
    .total {
      font-size: 1.3rem;
      margin: 1.2rem 0;
      text-align: right;
      font-weight: 700;
    }
    .approx {
      color: #888;
      font-size: 0.85rem;
      font-weight: 400;
    }

    /* Pay button */
    .btn-full {
      width: 100%;
      padding: 0.9rem;
      background: #e91e63;
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }
    .btn-full:hover {
      background: #ff3366;
    }
    .btn-full:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Status text */
    #status {
      text-align: center;
      margin-top: 1rem;
      color: #aaa;
      font-size: 0.9rem;
    }

    /* Empty cart message */
    #itemsList p {
      text-align: center;
      color: #888;
      padding: 2rem 0;
    }
    #itemsList p a {
      color: #e91e63;
      text-decoration: underline;
    }

    /* ========== Tablet & desktop ========== */
    @media (min-width: 600px) {
      .navbar {
        padding: 14px 24px;
      }
      .navbar h2 {
        font-size: 1.5rem;
      }
      .nav-btn {
        font-size: 0.9rem;
        padding: 0.5rem 1.2rem;
      }
      .container {
        margin: 40px auto;
        padding: 2rem 2rem;
      }
      .container h2 {
        font-size: 1.8rem;
      }
      .checkout-item span:first-child {
        font-size: 1rem;
      }
      .total {
        font-size: 1.5rem;
      }
    }

    @media (min-width: 900px) {
      .container {
        padding: 2.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <h2 style="color:#e91e63;">Checkout</h2>
    <button class="nav-btn logout" onclick="logout()">Logout</button>
  </div>
  <div class="container">
    <h2>Your Selection</h2>
    <div id="itemsList"></div>
    <div class="total">
      Total: <span id="totalAmount">$0.00</span>
      <span id="approx" class="approx" style="display:none;"></span>
    </div>
    <button class="btn-full" id="payBtn" disabled>Pay now</button>
    <p id="status" style="text-align:center; margin-top:1rem;"></p>
  </div>

  <script>
    const selected = JSON.parse(localStorage.getItem('selectedMedia') || '[]');
    let totalUSD = 0;
    let mediaItems = [];
    let userCurrency = 'USD';
    let userCountry = 'US';
    let conversionRate = 1;

    const countryToCurrency = {
      NG: 'NGN', GH: 'GHS', KE: 'KES', ZA: 'ZAR', TZ: 'TZS',
      UG: 'UGX', US: 'USD', GB: 'GBP', DE: 'EUR', FR: 'EUR',
      IT: 'EUR', ES: 'EUR', NL: 'EUR', BE: 'EUR', CA: 'CAD',
    };

    async function detectLocation() {
      try {
        const res = await fetch('https://ipapi.co/json/');
        const data = await res.json();
        userCountry = data.country || 'US';
        userCurrency = countryToCurrency[data.country] || data.currency || 'USD';
      } catch {
        const region = (navigator.language || '').split('-')[1] || 'US';
        userCountry = region;
        userCurrency = countryToCurrency[region] || 'USD';
      }
    }

    async function getExchangeRate(from = 'USD', to = 'USD') {
      if (from === to) return 1;
      try {
        const res = await fetch(`https://api.exchangerate-api.com/v4/latest/${from}`);
        const data = await res.json();
        return data.rates[to] || 1;
      } catch { return 1; }
    }

    function formatCurrency(amount, currency) {
      return new Intl.NumberFormat(navigator.language, {
        style: 'currency', currency
      }).format(amount);
    }

    async function loadCheckout() {
      await requireAuth();
      if (selected.length === 0) {
        document.getElementById('itemsList').innerHTML = '<p>No items selected. <a href="gallery.html">Go back</a></p>';
        return;
      }

      document.getElementById('status').textContent = 'Detecting location…';
      await detectLocation();
      conversionRate = await getExchangeRate('USD', userCurrency);
      document.getElementById('status').textContent = '';

      const { data, error } = await supabase.from('media').select('*').in('id', selected);
      if (error) return alert(error.message);
      mediaItems = data;

      const list = document.getElementById('itemsList');
      list.innerHTML = data.map(item => {
        const priceLocal = item.price * conversionRate;
        return `<div class="checkout-item">
          <span>${item.title} (${item.type})</span>
          <span>${formatCurrency(priceLocal, userCurrency)}</span>
        </div>`;
      }).join('');

      totalUSD = data.reduce((s, item) => s + item.price, 0);
      const totalLocal = totalUSD * conversionRate;
      document.getElementById('totalAmount').textContent = formatCurrency(totalLocal, userCurrency);
      if (userCurrency !== 'USD') {
        document.getElementById('approx').style.display = 'inline';
        document.getElementById('approx').textContent = `(~ ${formatCurrency(totalUSD, 'USD')})`;
      }
      document.getElementById('payBtn').disabled = false;
    }

    document.getElementById('payBtn').addEventListener('click', async () => {
      const btn = document.getElementById('payBtn');
      btn.disabled = true;
      btn.textContent = 'Processing…';

      const { data: orderData, error: orderError } = await supabase.functions.invoke('create-order', {
        body: { media_ids: selected, amount: totalUSD }
      });
      if (orderError) {
        alert(orderError.message);
        btn.disabled = false;
        btn.textContent = 'Pay with Flutterwave';
        return;
      }

      const localTotal = totalUSD * conversionRate;
      FlutterwaveCheckout({
        public_key: 'FLWPUBK_TEST-8a966986b6586ee1781803abbb3d30e9-X',
        tx_ref: orderData.tx_ref,
        amount: localTotal,
        currency: userCurrency,
        payment_options: 'card',
        customer: {
          email: (await supabase.auth.getUser()).data.user?.email,
        },
        callback: async (response) => {
          const { data: verify, error } = await supabase.functions.invoke('verify-payment', {
            body: { tx_ref: orderData.tx_ref, transaction_id: response.transaction_id }
          });
          if (error || verify.status !== 'success') {
            alert('Payment verification failed');
            return;
          }
          window.location.href = `success.html?token=${verify.download_token}`;
        },
        onclose: () => {
          btn.disabled = false;
          btn.textContent = 'Pay with Flutterwave';
        }
      });
    });

    loadCheckout();
  </script>
</body>
</html>
